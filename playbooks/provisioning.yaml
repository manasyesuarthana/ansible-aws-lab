---
- name: Provisioning servers
  hosts: all
  become: yes
  vars:
    dir1: /opt/test21
  tasks:
    - name: Install dependencies on CentOS
      ansible.builtin.yum:
        name: "{{ item }}"
        state: present
      when: ansible_distribution == "CentOS"
      loop:
        - chrony
        - wget
        - git
        - zip
        - unzip
        
    - name: Install dependencies on Ubuntu
      ansible.builtin.apt:
        name: "{{ item }}" 
        state: present
      when: ansible_distribution == "Ubuntu"
      loop:
        - chrony
        - wget
        - git
        - zip
        - unzip


    - name: Start service on CentOS
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: yes
      when: ansible_distribution == "CentOS"

    - name: Start service on Ubuntu
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: yes
      when: ansible_distribution == "Ubuntu"
    
    - name: Banner file
      copy:
        content: '# This server is managed by ansible. No manual changes please!'
        dest: ~/README.txt

    - name: Deploy ntp agent conf on CentOS
      ansible.builtin.template:
        src: ./templates/chronyconf_centos
        dest: /etc/chrony.conf
        backup: yes
      when: ansible_distribution == "CentOS"
      notify: 
        - Restart service on CentOS

    - name: Deploy ntp agent conf on Ubuntu
      ansible.builtin.template:
        src: ./templates/chronyconf_ubuntu
        dest: /etc/chrony/sources.d/us-pools.sources
        backup: yes
      when: ansible_distribution == "Ubuntu"
      notify:
        - Restart service on Ubuntu

    - name: Create a directory called test26 in /opt
      ansible.builtin.file:
        path: "{{ dir1 }}"
        state: directory
        mode: '0755'

    - name: Dump file/myfile.txt
      ansible.builtin.copy:
        src: ./files/myfile.txt
        dest: /tmp/myfile.txt
      

  handlers:
    - name: Restart service on CentOS
      ansible.builtin.service:
        name: chronyd
        state: restarted
        enabled: yes
      when: ansible_distribution == "CentOS"

    - name: Restart service on Ubuntu
      ansible.builtin.service:
        name: chrony
        state: restarted
        enabled: yes
      when: ansible_distribution == "Ubuntu"
    